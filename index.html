<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0;url=/index-en.html">
  <script>
    // Detect browser language and redirect
    window.addEventListener('load', function () {
      let lang = navigator.language.toLowerCase().split('-')[0];
      if (lang === 'zh') {
        const fullLang = navigator.language.toLowerCase();
        lang = (fullLang.includes('tw') || fullLang.includes('hk') || fullLang.includes('hant')) ? 'hant' : 'zh';
      }
      const langMap = {
        'en': '/index-en.html',
        'zh': '/index-zh.html',
        'ja': '/index-ja.html',
        'es': '/index-es.html',
        'hi': '/index-hi.html',
        'fr': '/index-fr.html',
        'de': '/index-de.html',
        'ar': '/index-ar.html',
        'hant': '/index-hant.html'
      };
      const targetUrl = langMap[lang] || '/index-en.html';
      window.location.href = targetUrl;
    });
  </script>
</head>
<body>
  <p>Redirecting to your preferred language...</p>
</body>
</html>
