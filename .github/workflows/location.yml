name: Location Check

on:
  schedule:
    # Run every hour, on the hour, between 11 AM and 11 PM, on weekdays (Wednesday-Friday)
    # The time is in UTC. Singapore time (SGT) is UTC+8.
    # So, 11 AM SGT is 03:00 UTC, and 11 PM SGT is 15:00 UTC.
    # Therefore, we need to schedule from 03:00 to 15:00 UTC.
    - cron: '0 3-15 * * 3,4,5'

    # Reminder to START sharing live location: Wednesday 11 AM SGT (3 AM UTC)
    - cron: '0 3 * * 3' # 3 for Wednesday

    # Reminder to STOP sharing live location: Friday 11 PM SGT (3 PM UTC)
    - cron: '0 15 * * 5' # 5 for Friday

  workflow_dispatch:
    inputs:
      job_name:
        description: 'Job to run (check_location, start_sharing_message, stop_sharing_message, send_message)'
        required: true
        default: 'send_message'
      message:
        description: 'Custom message for send_message job (optional)'
        required: false
        default: 'This is a manual trigger test message from GitHub Actions.'

  push:
    branches: ["main"]
    paths:
      - 'scripts/release/location_bot.py'
      - '.github/workflows/location.yml'

concurrency:
  group: 'location'
  cancel-in-progress: false

jobs:
  check_and_notify:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      TELEGRAM_LOCATION_BOT_API_KEY: ${{ secrets.TELEGRAM_LOCATION_BOT_API_KEY }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 5 # Fetch only the last 5 commits for efficiency

    - name: Set up Python 3.13.2
      uses: actions/setup-python@v4
      with:
        python-version: "3.13.2"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.simple.txt 

    - name: Run location check script (Scheduled)
      run: python scripts/release/location_bot.py --job check_location
      if: github.event.schedule == '0 3-15 * * 3,4,5'

    - name: Reminder to START sharing live location (Scheduled)
      run: python scripts/release/location_bot.py --job start_sharing_message
      if: github.event.schedule == '0 3 * * 3'

    - name: Reminder to STOP sharing live location (Scheduled)
      run: python scripts/release/location_bot.py --job stop_sharing_message
      if: github.event.schedule == '0 15 * * 5'

    - name: Run location check script (Manual Trigger)
      run: python scripts/release/location_bot.py --job check_location
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'check_location'

    - name: Reminder to START sharing live location (Manual Trigger)
      run: python scripts/release/location_bot.py --job start_sharing_message
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'start_sharing_message'

    - name: Reminder to STOP sharing live location (Manual Trigger)
      run: python scripts/release/location_bot.py --job stop_sharing_message
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'stop_sharing_message'

    - name: Run Telegram script for custom message (Manual Trigger)
      run: python scripts/release/location_bot.py --job send_message --message "${{ github.event.inputs.message }}"
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.job_name == 'send_message'

    - name: Run Telegram script for push to main branch
      run: python scripts/release/location_bot.py --job send_message --message "Code changes for location bot pushed to main branch."
      if: github.event_name == 'push'